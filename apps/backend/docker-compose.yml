services:
  postgres:
    image: postgres:17-bookworm
    container_name: musubi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-musubi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-musubi_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-musubi_dev}
      POSTGRES_TEST_DB: ${POSTGRES_TEST_DB:-musubi_test}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-musubi} -d ${POSTGRES_DB:-musubi_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-bookworm
    container_name: musubi_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build: .
    container_name: musubi_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-musubi}:${POSTGRES_PASSWORD:-musubi_local_dev}@postgres:5432/${POSTGRES_DB:-musubi_dev}
      MUSUBI_TEST_DATABASE_URL: postgres://${POSTGRES_USER:-musubi}:${POSTGRES_PASSWORD:-musubi_local_dev}@postgres:5432/${POSTGRES_TEST_DB:-musubi_test}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
