name: Backend DB smoke

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"

jobs:
  backend-db-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-bookworm
        env:
          POSTGRES_USER: musubi
          POSTGRES_PASSWORD: musubi_local_dev
          POSTGRES_DB: musubi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U musubi -d musubi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      DATABASE_URL: postgres://musubi:musubi_local_dev@127.0.0.1:5432/musubi_test
      MUSUBI_TEST_DATABASE_URL: postgres://musubi:musubi_local_dev@127.0.0.1:5432/musubi_test
      REQUIRE_LATEST_SCHEMA: "true"
      MIGRATIONS_DIR: ./migrations
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Bootstrap and migrate
        working-directory: apps/backend
        run: |
          cargo run -p musubi-ops -- db bootstrap
          cargo run -p musubi-ops -- db migrate
          cargo run -p musubi-ops -- db status
      - name: Runtime and backend checks
        working-directory: apps/backend
        run: |
          cargo test -p musubi_db_runtime
          cargo test -p musubi_backend
